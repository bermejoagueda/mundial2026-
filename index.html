<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 — Cuadro de resultados</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f0;color:#1a1a1a;min-height:100vh}
  header{background:#0a0a0a;color:white;padding:16px 24px;display:flex;align-items:center;gap:12px}
  header h1{font-size:18px;font-weight:500;letter-spacing:.3px}
  header span{font-size:13px;color:#888;margin-left:auto}
  .container{max-width:1100px;margin:0 auto;padding:24px 16px}
  .tab-bar{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid #ddd}
  .tab{padding:10px 20px;font-size:14px;cursor:pointer;border-radius:8px 8px 0 0;border:1px solid transparent;color:#666;background:transparent;font-family:inherit}
  .tab.active{background:white;border-color:#ddd;border-bottom-color:white;color:#1a1a1a;font-weight:500}
  .section{display:none}.section.active{display:block}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .legend{display:flex;gap:16px;flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:13px;color:#555}
  .dot{width:10px;height:10px;border-radius:50%}
  .dot-g{background:#1D9E75}.dot-a{background:#BA7517}
  .btn{padding:7px 14px;font-size:13px;cursor:pointer;border:1px solid #ccc;border-radius:8px;background:white;color:#555;font-family:inherit}
  .btn:hover{background:#f0f0f0}
  .groups-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
  .group-card{background:white;border:1px solid #e0e0e0;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .group-header{padding:7px 12px;font-size:11px;font-weight:600;letter-spacing:.8px;background:#f8f8f6;color:#666;text-transform:uppercase;border-bottom:1px solid #eee}
  .standings-header{display:grid;grid-template-columns:14px 1fr 24px 24px 24px 24px 30px;gap:2px;padding:4px 10px;font-size:10px;color:#999;background:#fafaf8;border-bottom:1px solid #f0f0f0}
  .standings-header span{text-align:center}
  .standings-row{display:grid;grid-template-columns:14px 1fr 24px 24px 24px 24px 30px;gap:2px;align-items:center;padding:4px 10px;font-size:12px}
  .standings-row.qualify{background:rgba(29,158,117,.07)}
  .standings-row.third{background:rgba(186,117,23,.07)}
  .pos-dot{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600}
  .p1,.p2{background:#1D9E75;color:white}.p3{background:#BA7517;color:white}.p4{background:#eee;color:#888}
  .tname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px}
  .tc{text-align:center;font-size:12px}.tc.pts{font-weight:600}
  .matches-section{border-top:1px solid #f0f0f0;padding:8px 10px}
  .match-label{font-size:10px;color:#aaa;margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
  .match-row{display:flex;align-items:center;gap:4px;margin-bottom:3px}
  .match-row input{width:26px;height:22px;text-align:center;font-size:11px;border:1px solid #ddd;border-radius:4px;background:#fafaf8;color:#1a1a1a;padding:0;font-family:inherit}
  .match-row input:focus{outline:none;border-color:#1D9E75;background:white}
  .tname-r{flex:1;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:68px;font-size:11px;color:#333}
  .tname-l{flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:68px;font-size:11px;color:#333}
  .sep{color:#bbb;font-size:11px}
  .thirds-bar{margin-top:16px;padding:10px 14px;background:white;border-radius:8px;border:1px solid #e8e8e0;font-size:12px;color:#666;line-height:1.7}
  .thirds-bar strong{color:#333;font-weight:500}
  .bracket-wrap{overflow-x:auto;padding-bottom:16px}
  .bracket{display:flex;min-width:900px;gap:0}
  .round-col{display:flex;flex-direction:column;flex:1;min-width:120px}
  .round-title{text-align:center;font-size:10px;color:#888;padding:8px 4px;font-weight:600;background:#f8f8f6;border-bottom:1px solid #eee;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
  .matches-col{display:flex;flex-direction:column;justify-content:space-around;flex:1;padding:0 3px;gap:4px}
  .match-box{background:white;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .mt{display:flex;align-items:center;justify-content:space-between;padding:4px 6px;font-size:11px;gap:4px}
  .mt.winner{background:rgba(29,158,117,.1);font-weight:500}
  .mt input{width:20px;height:18px;text-align:center;font-size:10px;border:1px solid #ddd;border-radius:3px;background:#fafaf8;color:#1a1a1a;padding:0;font-family:inherit}
  .mt input:focus{outline:none;border-color:#1D9E75}
  .mt-sep{height:1px;background:#f0f0f0}
  .mtn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:68px;color:#333}
  .champion-box{display:flex;align-items:center;justify-content:center;flex:1;padding:12px;text-align:center}
  .champion-box .trophy{font-size:28px;margin-bottom:6px}
  .champion-box .champ-name{font-size:13px;font-weight:600;color:#1a1a1a;min-height:20px}
  .stats-section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.6px;margin:0 0 10px}
  .metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:20px}
  .metric{background:white;border:1px solid #e0e0e0;border-radius:10px;padding:12px 14px}
  .metric-label{font-size:11px;color:#888;margin-bottom:4px}
  .metric-value{font-size:22px;font-weight:600;color:#1a1a1a;line-height:1}
  .metric-sub{font-size:11px;color:#aaa;margin-top:3px}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .stat-card{background:white;border:1px solid #e0e0e0;border-radius:10px;padding:12px 14px}
  .stat-card-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
  .rank-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #f5f5f5;font-size:12px}
  .rank-row:last-child{border-bottom:none}
  .rank-num{font-size:10px;color:#bbb;width:14px;text-align:center}
  .rank-name{flex:1;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rank-bar-wrap{width:60px;height:4px;background:#f0f0f0;border-radius:2px;overflow:hidden}
  .rank-bar{height:4px;border-radius:2px}
  .bar-green{background:#1D9E75}
  .bar-amber{background:#BA7517}
  .rank-val{font-size:12px;font-weight:600;color:#1a1a1a;min-width:22px;text-align:right}
  .highlight-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:12px;gap:8px}
  .highlight-row:last-child{border-bottom:none}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
  .badge-green{background:#E1F5EE;color:#0F6E56}
  .scorers-card{background:white;border:1px solid #e0e0e0;border-radius:10px;padding:12px 14px;margin-bottom:12px}
  .scorer-add{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
  .scorer-add select,.scorer-add input[type=text]{flex:1;min-width:120px;font-size:12px;padding:6px 8px;border:1px solid #ddd;border-radius:6px;background:#fafaf8;color:#1a1a1a;font-family:inherit}
  .scorer-add input[type=number]{width:52px;font-size:12px;padding:6px 8px;border:1px solid #ddd;border-radius:6px;background:#fafaf8;color:#1a1a1a;font-family:inherit;text-align:center}
  .scorer-add input:focus,.scorer-add select:focus{outline:none;border-color:#1D9E75}
  .btn-add{padding:6px 12px;font-size:12px;border:1px solid #1D9E75;border-radius:6px;color:#0F6E56;background:#E1F5EE;cursor:pointer;font-family:inherit;white-space:nowrap}
  .btn-add:hover{background:#9FE1CB}
  .scorer-row{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:12px}
  .scorer-row:last-child{border-bottom:none}
  .scorer-goals{font-size:14px;font-weight:700;color:#1D9E75;min-width:20px;text-align:center}
  .scorer-name{flex:1;color:#1a1a1a;font-weight:500}
  .scorer-team{font-size:11px;color:#888}
  .scorer-del{background:none;border:none;cursor:pointer;color:#ddd;font-size:14px;padding:0 2px;line-height:1}
  .scorer-del:hover{color:#E24B4A}
  .empty-msg{font-size:12px;color:#bbb;padding:8px 0;text-align:center}
  footer{text-align:center;padding:24px;font-size:12px;color:#aaa;margin-top:8px}
  @media(max-width:600px){
    .groups-grid{grid-template-columns:1fr}
    .bracket{min-width:700px}
    .two-col{grid-template-columns:1fr}
    .metric-grid{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>
<header>
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="white" stroke-width="1.2"/><path d="M10 1a9 9 0 0 1 0 18M10 1a9 9 0 0 0 0 18M1 10h18" stroke="white" stroke-width="1.2"/><path d="M3 5.5C4.5 7 7 8 10 8s5.5-1 7-2.5M3 14.5C4.5 13 7 12 10 12s5.5 1 7 2.5" stroke="white" stroke-width="1.2"/></svg>
  <h1>Copa Mundial FIFA 2026</h1>
  <span>Cuadro de resultados</span>
</header>

<div class="container">
  <div class="tab-bar">
    <button class="tab active" onclick="showTab('grupos',this)">Fase de grupos</button>
    <button class="tab" onclick="showTab('elim',this)">Eliminatorias</button>
    <button class="tab" onclick="showTab('stats',this)">Estadísticas</button>
  </div>

  <div id="grupos" class="section active">
    <div class="top-bar">
      <div class="legend">
        <div class="legend-item"><div class="dot dot-g"></div> Clasifican directamente (1.º y 2.º)</div>
        <div class="legend-item"><div class="dot dot-a"></div> Posible mejor 3.º</div>
      </div>
      <button class="btn" onclick="resetAll()">↺ Reiniciar todo</button>
    </div>
    <div id="groups-container" class="groups-grid"></div>
    <div class="thirds-bar" id="thirds-info"><strong>Los 8 mejores terceros también clasifican a dieciseisavos.</strong> <span id="thirds-list"></span></div>
  </div>

  <div id="elim" class="section">
    <div class="top-bar">
      <div style="font-size:13px;color:#666">Los clasificados se propagan automáticamente desde la fase de grupos</div>
      <button class="btn" onclick="resetBracket()">↺ Reiniciar eliminatorias</button>
    </div>
    <div class="bracket-wrap"><div class="bracket" id="bracket"></div></div>
  </div>

  <div id="stats" class="section">
    <div id="stats-content"></div>
  </div>
</div>

<footer>Mundial 2026 · Canadá, México &amp; EE.UU. · 11 jun – 19 jul 2026</footer>

<script>
const GROUPS={
  A:['México','Corea del Sur','Rep. Checa','Sudáfrica'],
  B:['Canadá','Bosnia y Herz.','Catar','Suiza'],
  C:['Brasil','Marruecos','Haití','Escocia'],
  D:['EE.UU.','Paraguay','Australia','Turquía'],
  E:['Alemania','Curazao','Costa de Marfil','Ecuador'],
  F:['Países Bajos','Japón','Suecia','Túnez'],
  G:['Bélgica','Egipto','Irán','Nueva Zelanda'],
  H:['España','Uruguay','Cabo Verde','Arabia Saudí'],
  I:['Francia','Noruega','Senegal','Irak'],
  J:['Argentina','Austria','Argelia','Jordania'],
  K:['Portugal','Colombia','R.D. Congo','Uzbekistán'],
  L:['Inglaterra','Croacia','Ghana','Panamá']
};
const MATCHES_TPL=[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]];
const MATCHES={};
Object.keys(GROUPS).forEach(g=>MATCHES[g]=MATCHES_TPL);

let scores={},bScores={},scorers=[];
const STORAGE_KEY='mundial2026_v1';

function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({scores,bScores,scorers}))}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');scores=d.scores||{};bScores=d.bScores||{};scorers=d.scorers||[]}catch(e){scores={};bScores={};scorers=[]}}

function gk(g,m,t){return g+'_'+m+'_'+t}
function gs(g,m,t){const v=scores[gk(g,m,t)];return v===undefined||v===''?null:parseInt(v)}

function standings(g){
  const ts=GROUPS[g],pts=[0,0,0,0],gf=[0,0,0,0],ga=[0,0,0,0],pj=[0,0,0,0];
  MATCHES[g].forEach(function(m,i){
    const s1=gs(g,i,0),s2=gs(g,i,1);
    if(s1===null||s2===null)return;
    pj[m[0]]++;pj[m[1]]++;
    gf[m[0]]+=s1;ga[m[0]]+=s2;
    gf[m[1]]+=s2;ga[m[1]]+=s1;
    if(s1>s2)pts[m[0]]+=3;
    else if(s1===s2){pts[m[0]]++;pts[m[1]]++;}
    else pts[m[1]]+=3;
  });
  return [0,1,2,3].sort(function(a,b){return pts[b]-pts[a]||(gf[b]-ga[b])-(gf[a]-ga[a])||gf[b]-gf[a];}).map(function(i){
    return{name:ts[i],pts:pts[i],gf:gf[i],ga:ga[i],gd:gf[i]-ga[i],pj:pj[i]};
  });
}

function renderGroups(){
  const cont=document.getElementById('groups-container');
  cont.innerHTML='';
  Object.keys(GROUPS).forEach(function(g){
    const ts=GROUPS[g],std=standings(g);
    const card=document.createElement('div');
    card.className='group-card';
    card.innerHTML='<div class="group-header">Grupo '+g+'</div><div class="standings-header"><span></span><span></span><span>PJ</span><span>GD</span><span>GF</span><span>P</span><span>Pts</span></div>';
    std.forEach(function(t,pos){
      const row=document.createElement('div');
      row.className='standings-row'+(pos<2?' qualify':pos===2?' third':'');
      const w=Math.floor(t.pts/3),d=t.pts-w*3,l=t.pj-w-d;
      row.innerHTML='<div class="pos-dot p'+(pos+1)+'">'+(pos+1)+'</div><div class="tname" title="'+t.name+'">'+t.name+'</div><div class="tc">'+t.pj+'</div><div class="tc">'+(t.gd>0?'+'+t.gd:t.gd)+'</div><div class="tc">'+t.gf+'</div><div class="tc">'+l+'</div><div class="tc pts">'+t.pts+'</div>';
      card.appendChild(row);
    });
    const md=document.createElement('div');
    md.className='matches-section';
    md.innerHTML='<div class="match-label">Partidos</div>';
    MATCHES[g].forEach(function(m,i){
      const r=document.createElement('div');
      r.className='match-row';
      const k1=gk(g,i,0),k2=gk(g,i,1);
      r.innerHTML='<span class="tname-r" title="'+ts[m[0]]+'">'+ts[m[0]]+'</span><input type="number" min="0" max="20" value="'+(scores[k1]||'')+'" data-key="'+k1+'" onchange="upd(this)"><span class="sep">–</span><input type="number" min="0" max="20" value="'+(scores[k2]||'')+'" data-key="'+k2+'" onchange="upd(this)"><span class="tname-l" title="'+ts[m[1]]+'">'+ts[m[1]]+'</span>';
      md.appendChild(r);
    });
    card.appendChild(md);
    cont.appendChild(card);
  });
  updateThirds();
}

function upd(el){scores[el.dataset.key]=el.value;save();renderGroups();}

function updateThirds(){
  const all=Object.keys(GROUPS).map(function(g){const std=standings(g);return Object.assign({group:g},std[2]);}).filter(function(t){return t&&t.pj>0;}).sort(function(a,b){return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf;});
  const el=document.getElementById('thirds-list');
  el.textContent=all.length?'Mejores terceros: '+all.slice(0,8).map(function(t){return t.name+' ('+t.group+', '+t.pts+'pts)';}).join(' · '):'';
}

const ROUNDS=[{name:'Dieciseisavos',count:32},{name:'Octavos',count:16},{name:'Cuartos',count:8},{name:'Semifinales',count:4},{name:'Final',count:2},{name:'Campeón',count:1}];
function bk(r,m,t){return 'r'+r+'_m'+m+'_t'+t}

function getGroupAdvancer(slot){
  const order=['A','B','C','D','E','F','G','H','I','J','K','L'];
  const firsts=order.map(function(g){return standings(g)[0]?standings(g)[0].name:'1.º Grupo '+g;});
  const seconds=order.map(function(g){return standings(g)[1]?standings(g)[1].name:'2.º Grupo '+g;});
  const allThirds=Object.keys(GROUPS).map(function(g){const s=standings(g);return{name:s[2]?s[2].name:'3.º Grupo '+g,pts:s[2]?s[2].pts:0,gd:s[2]?s[2].gd:0,gf:s[2]?s[2].gf:0,pj:s[2]?s[2].pj:0};}).filter(function(t){return t.pj>0;}).sort(function(a,b){return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf;});
  function t3(i){return allThirds[i]?allThirds[i].name:'3.º mejor ('+(i+1)+'º)';}
  const p=[firsts[0],seconds[1],firsts[2],seconds[3],firsts[4],seconds[5],firsts[6],seconds[7],firsts[8],seconds[9],firsts[10],seconds[11],seconds[0],firsts[1],seconds[2],firsts[3],seconds[4],firsts[5],seconds[6],firsts[7],seconds[8],firsts[9],seconds[10],firsts[11],t3(0),t3(1),t3(2),t3(3),t3(4),t3(5),t3(6),t3(7)];
  return p[slot]||'?';
}

function getWinner(r,mi){
  const k1=bk(r,mi,0),k2=bk(r,mi,1);
  const s1=bScores[k1],s2=bScores[k2];
  if(s1===undefined||s2===undefined||s1===''||s2==='')return '?';
  const t1=r===0?getGroupAdvancer(mi*2):getWinner(r-1,mi*2);
  const t2=r===0?getGroupAdvancer(mi*2+1):getWinner(r-1,mi*2+1);
  if(parseInt(s1)>parseInt(s2))return t1;
  if(parseInt(s2)>parseInt(s1))return t2;
  return '?';
}

function renderBracket(){
  const bracket=document.getElementById('bracket');
  bracket.innerHTML='';
  ROUNDS.forEach(function(round,ri){
    const col=document.createElement('div');col.className='round-col';
    col.innerHTML='<div class="round-title">'+round.name+'</div>';
    const mc=document.createElement('div');mc.className='matches-col';
    if(ri===5){
      const champ=getWinner(4,0);
      mc.innerHTML='<div class="champion-box"><div><div class="trophy">&#127942;</div><div class="champ-name">'+(champ==='?'?'Por definir':champ)+'</div></div></div>';
    } else {
      const matchCount=round.count/2;
      for(let mi=0;mi<matchCount;mi++){
        const box=document.createElement('div');box.className='match-box';
        const t1=ri===0?getGroupAdvancer(mi*2):getWinner(ri-1,mi*2);
        const t2=ri===0?getGroupAdvancer(mi*2+1):getWinner(ri-1,mi*2+1);
        const k1=bk(ri,mi,0),k2=bk(ri,mi,1);
        const s1=bScores[k1]||'',s2=bScores[k2]||'';
        const w1=s1!==''&&s2!==''&&parseInt(s1)>parseInt(s2);
        const w2=s1!==''&&s2!==''&&parseInt(s2)>parseInt(s1);
        box.innerHTML='<div class="mt'+(w1?' winner':'')+'"><span class="mtn" title="'+t1+'">'+t1+'</span><input type="number" min="0" max="20" value="'+s1+'" data-key="'+k1+'" onchange="updB(this)"></div><div class="mt-sep"></div><div class="mt'+(w2?' winner':'')+'"><span class="mtn" title="'+t2+'">'+t2+'</span><input type="number" min="0" max="20" value="'+s2+'" data-key="'+k2+'" onchange="updB(this)"></div>';
        mc.appendChild(box);
      }
    }
    col.appendChild(mc);bracket.appendChild(col);
  });
}

function updB(el){bScores[el.dataset.key]=el.value;save();renderBracket();}

function calcStats(){
  let totalGoals=0,played=0,wins=0,draws=0;
  const goalsByTeam={},goalsConceded={},matchGoals=[];
  Object.keys(GROUPS).forEach(function(g){
    GROUPS[g].forEach(function(t){goalsByTeam[t]=goalsByTeam[t]||0;goalsConceded[t]=goalsConceded[t]||0;});
    MATCHES[g].forEach(function(m,i){
      const s1=gs(g,i,0),s2=gs(g,i,1);
      if(s1===null||s2===null)return;
      played++;totalGoals+=s1+s2;
      const t1=GROUPS[g][m[0]],t2=GROUPS[g][m[1]];
      goalsByTeam[t1]=(goalsByTeam[t1]||0)+s1;
      goalsByTeam[t2]=(goalsByTeam[t2]||0)+s2;
      goalsConceded[t1]=(goalsConceded[t1]||0)+s2;
      goalsConceded[t2]=(goalsConceded[t2]||0)+s1;
      if(s1===s2)draws++;else wins++;
      matchGoals.push({label:t1+' '+s1+'-'+s2+' '+t2,total:s1+s2});
    });
  });
  const avg=played>0?(totalGoals/played).toFixed(1):'0.0';
  const topScoring=Object.entries(goalsByTeam).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  const topConceded=Object.entries(goalsConceded).sort(function(a,b){return a[1]-b[1];}).slice(0,5);
  const topMatches=matchGoals.sort(function(a,b){return b.total-a.total;}).slice(0,4);
  const zeroDef=Object.entries(goalsConceded).filter(function(e){return e[1]===0;}).map(function(e){return e[0];});
  const maxTop=topScoring.length?topScoring[0][1]:1;

  const scorerMap={};
  scorers.forEach(function(s){
    const key=s.name+'|||'+s.team;
    scorerMap[key]=(scorerMap[key]||0)+s.goals;
  });
  const scorerList=Object.entries(scorerMap).map(function(e){
    const parts=e[0].split('|||');
    return{name:parts[0],team:parts[1],goals:e[1]};
  }).sort(function(a,b){return b.goals-a.goals;});

  return{totalGoals,played,wins,draws,avg,topScoring,topConceded,topMatches,zeroDef,maxTop,scorerList};
}

function buildMatchOptions(){
  let opts='<option value="">Seleccionar partido...</option>';
  Object.keys(GROUPS).forEach(function(g){
    MATCHES[g].forEach(function(m,i){
      const s1=gs(g,i,0),s2=gs(g,i,1);
      const t1=GROUPS[g][m[0]],t2=GROUPS[g][m[1]];
      const score=s1!==null&&s2!==null?' '+s1+'-'+s2:'';
      opts+='<option value="'+g+'_'+i+'">'+t1+score+' vs '+t2+' (Gr.'+g+')</option>';
    });
  });
  return opts;
}

function renderStats(){
  const s=calcStats();
  const cont=document.getElementById('stats-content');
  const pct=s.played>0?Math.round(s.draws/s.played*100):0;
  const winpct=s.played>0?Math.round(s.wins/s.played*100):0;

  let topScoringHTML=s.topScoring.length?s.topScoring.map(function(e,i){
    return '<div class="rank-row"><span class="rank-num">'+(i+1)+'</span><span class="rank-name" title="'+e[0]+'">'+e[0]+'</span><div class="rank-bar-wrap"><div class="rank-bar bar-green" style="width:'+Math.round(e[1]/s.maxTop*100)+'%"></div></div><span class="rank-val">'+e[1]+'</span></div>';
  }).join(''):'<div class="empty-msg">Sin partidos jugados aún</div>';

  let topConcededHTML=s.topConceded.length?s.topConceded.map(function(e,i){
    const maxC=s.topConceded[s.topConceded.length-1][1]||1;
    return '<div class="rank-row"><span class="rank-num">'+(i+1)+'</span><span class="rank-name" title="'+e[0]+'">'+e[0]+'</span><div class="rank-bar-wrap"><div class="rank-bar bar-amber" style="width:'+(e[1]===0?5:Math.round(e[1]/maxC*100))+'%"></div></div><span class="rank-val">'+e[1]+'</span></div>';
  }).join(''):'<div class="empty-msg">Sin partidos jugados aún</div>';

  let topMatchesHTML=s.topMatches.length?s.topMatches.map(function(m){
    return '<div class="highlight-row"><span style="color:#333;font-size:12px">'+m.label+'</span><span class="badge badge-green">'+m.total+' goles</span></div>';
  }).join(''):'<div class="empty-msg">Sin partidos jugados aún</div>';

  let zeroHTML=s.zeroDef.length?s.zeroDef.slice(0,5).map(function(t){
    return '<div class="rank-row"><span class="rank-name">'+t+'</span><span class="badge badge-green">0 goles</span></div>';
  }).join(''):'<div class="empty-msg">Sin portería a cero aún</div>';

  let scorerHTML=s.scorerList.length?s.scorerList.map(function(sc){
    return '<div class="scorer-row"><span class="scorer-goals">'+sc.goals+'</span><span class="scorer-name">'+sc.name+'</span><span class="scorer-team">'+sc.team+'</span><button class="scorer-del" onclick="delScorer(\''+sc.name.replace(/'/g,"\\'")+'\')" title="Eliminar">✕</button></div>';
  }).join(''):'<div class="empty-msg">Añade goleadores con el formulario de arriba</div>';

  cont.innerHTML=
    '<div class="stats-section-title">Resumen del torneo</div>'+
    '<div class="metric-grid">'+
      '<div class="metric"><div class="metric-label">Goles totales</div><div class="metric-value">'+s.totalGoals+'</div><div class="metric-sub">'+s.avg+' por partido</div></div>'+
      '<div class="metric"><div class="metric-label">Partidos jugados</div><div class="metric-value">'+s.played+'</div><div class="metric-sub">de 72 en grupos</div></div>'+
      '<div class="metric"><div class="metric-label">Con goleador</div><div class="metric-value">'+s.wins+'</div><div class="metric-sub">'+winpct+'% de partidos</div></div>'+
      '<div class="metric"><div class="metric-label">Empates</div><div class="metric-value">'+s.draws+'</div><div class="metric-sub">'+pct+'% de partidos</div></div>'+
    '</div>'+
    '<div class="two-col">'+
      '<div class="stat-card"><div class="stat-card-title">Más goleadores</div>'+topScoringHTML+'</div>'+
      '<div class="stat-card"><div class="stat-card-title">Menos goleados</div>'+topConcededHTML+'</div>'+
    '</div>'+
    '<div class="two-col">'+
      '<div class="stat-card"><div class="stat-card-title">Partidos con más goles</div>'+topMatchesHTML+'</div>'+
      '<div class="stat-card"><div class="stat-card-title">Porterías a cero</div>'+zeroHTML+'</div>'+
    '</div>'+
    '<div class="scorers-card">'+
      '<div class="stat-card-title">Máximos goleadores</div>'+
      '<div class="scorer-add">'+
        '<select id="scorer-match">'+buildMatchOptions()+'</select>'+
        '<input type="text" id="scorer-name" placeholder="Nombre del jugador">'+
        '<input type="number" id="scorer-goals-n" min="1" max="10" value="1">'+
        '<button class="btn-add" onclick="addScorer()">+ Añadir gol</button>'+
      '</div>'+
      '<div id="scorer-list">'+scorerHTML+'</div>'+
    '</div>';
}

function addScorer(){
  const matchVal=document.getElementById('scorer-match').value;
  const name=document.getElementById('scorer-name').value.trim();
  const goals=parseInt(document.getElementById('scorer-goals-n').value)||1;
  if(!name)return;
  let team='';
  if(matchVal){
    const parts=matchVal.split('_');
    const g=parts[0],mi=parseInt(parts[1]);
    team=GROUPS[g][MATCHES[g][mi][0]];
  }
  scorers.push({name:name,team:team,goals:goals});
  document.getElementById('scorer-name').value='';
  document.getElementById('scorer-goals-n').value='1';
  save();renderStats();
}

function delScorer(name){
  const idx=scorers.findIndex(function(s){return s.name===name;});
  if(idx>=0){scorers.splice(idx,1);save();renderStats();}
}

function showTab(t,btn){
  document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.section').forEach(function(el){el.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById(t).classList.add('active');
  if(t==='elim')renderBracket();
  if(t==='stats')renderStats();
}

function resetAll(){
  if(!confirm('Reiniciar todos los resultados de la fase de grupos?'))return;
  scores={};save();renderGroups();
}
function resetBracket(){
  if(!confirm('Reiniciar los resultados de las eliminatorias?'))return;
  bScores={};save();renderBracket();
}

load();
renderGroups();
</script>
</body>
</html>
